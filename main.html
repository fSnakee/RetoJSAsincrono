<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="main.js"></script>
    <title>Cócteles</title>
</head>
<body>
<header>
    <h3>Catálogo Aleatorio de Cócteles</h3>
</header>
<main>
    <div class="mainContainer">
        <div class="infoContainer">
            <div class="buttons">
                <button id="randomBtn">Generar Cóctel Aleatorio</button>
                <button id="favBtn">Agregar Cóctel Favorito</button>
            </div>
            <div class="cocktailContainer" id="cocktailContainer">
            </div>
            <div id="emptyInfoContainer">
                <p>Error, no se cargó correctamente el cóctel</p>
            </div>
        </div>
        <div class="favContainer">
            <div class="emptyFavContainer">
                <p>No tienes ningún cóctel favorito. Agrega un cóctel para verlo aquí</p>
            </div>
        </div>
    </div>
</main>
<footer>
    <p>Kenny Kaven Fang Cen 350030</p>
    <p>Juan Manuel Castro Pardo 352237</p>
    <p>Camilo Andrés Fajardo Acosta 347646</p>
</footer>
</body>
</html>
